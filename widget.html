<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VettoChat Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Force transparent background so it blends seamlessly into the parent website */
  body, html { 
    background: transparent !important; 
    margin: 0; 
    padding: 0; 
    overflow: hidden; /* Prevents scrollbars in the iframe */
    font-family: 'Inter', sans-serif;
  }
  
  *, *::before, *::after { box-sizing: border-box; }
  
  :root {
    --brand-color: #2563EB;
    --brand-hover: #1E40AF;
    --bg-light: #F9FAFB;
    --text-main: #111827;
    --text-muted: #6B7280;
    --border: #E5E7EB;
  }

  /* Chat Button */
  .chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background: var(--brand-color);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(37,99,235,0.3);
    transition: all 0.3s ease;
    z-index: 1000;
  }
  .chat-btn:hover { transform: scale(1.05); background: var(--brand-hover); }
  .chat-btn.open { transform: rotate(90deg) scale(0); opacity: 0; pointer-events: none; }
  .chat-btn svg { width: 28px; height: 28px; fill: #fff; }

  /* Chat Label (Prompt) */
  .chat-btn-label {
    position: fixed;
    bottom: 32px;
    right: 95px;
    background: #fff;
    color: var(--text-main);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 999;
    animation: float 3s ease-in-out infinite;
  }
  .chat-btn-label::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border-width: 6px 0 6px 6px;
    border-style: solid;
    border-color: transparent transparent transparent #fff;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Chat Modal */
  .chat-modal {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 360px;
    height: 600px;
    max-height: calc(100vh - 40px);
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    z-index: 1000;
    overflow: hidden;
  }
  .chat-modal.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  /* Header */
  .chat-header {
    background: var(--brand-color);
    color: #fff;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-info { display: flex; align-items: center; gap: 12px; }
  .bot-avatar {
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }
  .header-text h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .header-text p { margin: 4px 0 0; font-size: 12px; opacity: 0.8; display: flex; align-items: center; gap: 4px; }
  .status-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; }
  
  .close-btn {
    background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .close-btn:hover { opacity: 1; }

  /* Messages Area */
  .chat-messages {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    background: var(--bg-light);
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  
  /* Bubbles */
  .msg-row { display: flex; flex-direction: column; }
  .msg-bot { align-items: flex-start; }
  .msg-user { align-items: flex-end; }
  .msg-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: popIn 0.3s ease forwards;
  }
  @keyframes popIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-bot .msg-bubble {
    background: #fff;
    color: var(--text-main);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg-bot .msg-bubble.success {
    background: #ECFDF5;
    border-color: #A7F3D0;
    color: #065F46;
  }
  .msg-user .msg-bubble {
    background: var(--brand-color);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
    animation: popIn 0.3s ease forwards;
    animation-delay: 0.1s;
  }
  .chip {
    background: #fff;
    border: 1px solid var(--brand-color);
    color: var(--brand-color);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .chip:hover { background: var(--brand-color); color: #fff; }

  /* Input Area */
  .chat-input-area {
    padding: 16px;
    background: #fff;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .chat-input-area input {
    flex: 1;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 24px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .chat-input-area input:focus { border-color: var(--brand-color); }
  .chat-input-area input:disabled { background: var(--bg-light); cursor: not-allowed; }
  
  .send-btn {
    width: 40px;
    height: 40px;
    background: var(--brand-color);
    color: #fff;
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }
  .send-btn:hover:not(:disabled) { background: var(--brand-hover); }
  .send-btn:disabled { background: #D1D5DB; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; fill: #fff; }

  /* Typing Indicator */
  .typing { display: flex; gap: 4px; padding: 16px; align-items: center; width: 60px; height: 45px;}
  .dot { width: 6px; height: 6px; background: #9CA3AF; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }
</style>
</head>
<body>

  <!-- Floating Prompt -->
  <div class="chat-btn-label" id="chatLabel">
    👋 Need a free quote?
  </div>

  <!-- Chat Toggle Button -->
  <div class="chat-btn" id="chatBtn" onclick="toggleChat()">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  </div>

  <!-- Main Chat Modal -->
  <div class="chat-modal" id="chatModal">
    <div class="chat-header">
      <div class="header-info">
        <div class="bot-avatar">🤖</div>
        <div class="header-text">
          <h3>Vetto Assistant</h3>
          <p><span class="status-dot"></span> Online - Replies instantly</p>
        </div>
      </div>
      <button class="close-btn" onclick="toggleChat()">&times;</button>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <!-- Messages populate here -->
    </div>
    
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
const chatBox = $('chatMessages');
const chatInput = $('chatInput');

// ─── CONVERSATION FLOW ENGINE ───────────────────────────────────────────────
const STEPS = [
  { id:'intent', msg:"Hi! What can we help you with today?", type:'chips', options:['Active Leak / Storm Damage','Full Roof Replacement','Minor Repair','Gutter Cleaning'] },
  { id:'urgency', msg:"Got it. How soon do you need this handled?", type:'chips', options:['Emergency (Within 24h)','This week','Just browsing'] },
  { id:'name', msg:"Okay, we can help with that. What's your first name?", type:'text' },
  { id:'phone', msg:"Nice to meet you! What's the best phone number for our team to reach you at?", type:'text' }
];

let S = { step: 0, data: {}, done: false, started: false };

// ─── TOGGLE CHAT (IFRAME AWARE) ─────────────────────────────────────────────
function toggleChat() {
  const modal = $('chatModal');
  const btn = $('chatBtn');
  const label = $('chatLabel');
  const isOpen = modal.classList.contains('open');
  
  if (isOpen) {
    modal.classList.remove('open');
    btn.classList.remove('open');
    label.style.display = 'flex';
    // Tell parent website to shrink the iframe
    window.parent.postMessage('vettochat-close', '*');
  } else {
    modal.classList.add('open');
    btn.classList.add('open');
    label.style.display = 'none';
    // Tell parent website to expand the iframe
    window.parent.postMessage('vettochat-open', '*');
    
    if(!S.started) {
      S.started = true;
      askStep(0);
    }
    setTimeout(() => chatInput.focus(), 300);
  }
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
function scrollBottom() {
  chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg-row msg-bot';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="msg-bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chatBox.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = $('typingIndicator');
  if(t) t.remove();
}

function addBotMsg(text, type='normal', chips=[]) {
  const div = document.createElement('div');
  div.className = 'msg-row msg-bot';
  let html = `<div class="msg-bubble ${type}">${text}</div>`;
  
  if (chips.length > 0) {
    html += `<div class="chips">` + chips.map(c => `<div class="chip" onclick="handleChip('${c}')">${c}</div>`).join('') + `</div>`;
  }
  
  div.innerHTML = html;
  chatBox.appendChild(div);
  scrollBottom();
}

function addUserMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-row msg-user';
  div.innerHTML = `<div class="msg-bubble">${text}</div>`;
  chatBox.appendChild(div);
  
  // Disable old chips
  document.querySelectorAll('.chip').forEach(c => {
    c.style.pointerEvents = 'none';
    c.style.opacity = '0.6';
  });
  scrollBottom();
}

// ─── LOGIC ───────────────────────────────────────────────────────────────────
function askStep(index) {
  showTyping();
  setTimeout(() => {
    removeTyping();
    const step = STEPS[index];
    if (step.type === 'chips') {
      addBotMsg(step.msg, 'normal', step.options);
      chatInput.disabled = true;
      chatInput.placeholder = 'Please select an option above...';
    } else {
      addBotMsg(step.msg);
      chatInput.disabled = false;
      chatInput.placeholder = 'Type your answer...';
      chatInput.focus();
    }
  }, 800);
}

function handleChip(val) {
  if (S.done) return;
  addUserMsg(val);
  processAnswer(STEPS[S.step].id, val);
}

function handleSend() {
  if (S.done || chatInput.disabled) return;
  const val = chatInput.value.trim();
  if (!val) return;
  
  chatInput.value = '';
  addUserMsg(val);
  processAnswer(STEPS[S.step].id, val);
}

function processAnswer(key, val) {
  // Save Data
  S.data[key] = val;
  if(key === 'name') S.data.firstName = val.trim().split(/\s+/)[0];

  S.step++;
  
  if (S.step >= STEPS.length) {
    finishConversation();
  } else {
    askStep(S.step);
  }
}

chatInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter') handleSend();
});

// ─── API SUBMISSION (THE MULTI-TENANT PAYLOAD) ─────────────────────────────
async function finishConversation() {
  S.done = true;
  chatInput.disabled = true;
  $('sendBtn').disabled = true;
  chatInput.placeholder = 'Thank you!';
  
  showTyping();

  const intent = S.data.intent || 'General Inquiry';
  const urgency = S.data.urgency || 'Standard';

  // 1. EXTRACT TENANT ID FROM URL
  const urlParams = new URLSearchParams(window.location.search);
  const tenantId = urlParams.get('tenantId') || 'test-tenant-id';

  // 2. BUILD THE MULTI-TENANT PAYLOAD
  const leadPayload = {
    tenantId: tenantId,
    firstName: S.data.firstName || 'Unknown',
    phone: S.data.phone || 'No Phone',
    intent: intent,
    urgency: urgency,
    source: window.location.hostname
  };

  try {
    const response = await fetch('http://localhost:8080/api/leads/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(leadPayload)
    });

    if(response.ok) {
      setTimeout(() => {
        removeTyping();
        addBotMsg(`You're all set, <strong>${S.data.firstName}</strong>! Our team will call you within 60 minutes.`, 'success');
      }, 900);
    }
  } catch (error) {
    console.error("VettoChat Payload Failed:", error);
    removeTyping();
    addBotMsg("Thanks! We've received your info and will be in touch.", "success");
  }
}
</script>
</body>
</html>
